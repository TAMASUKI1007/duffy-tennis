<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #FFFFFF; color: #111111; }
body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
:focus-visible { outline: 3px solid #111111; outline-offset: 3px; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</helmet>

<div data-screen-label="ダッフィー先生の想い" style="min-height:100svh;background:#FFFFFF;color:#111111;">
  <header style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px clamp(16px,4vw,40px);border-bottom:3px solid #111111;background:#FFFFFF;">
    <a href="index.html" style="font-weight:900;font-size:13px;text-decoration:none;color:#111111;border:2px solid #111111;padding:6px 12px;" style-hover="background:#111111;color:#E9FF00;">← MatchUpへ戻る</a>
    <div style="font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:20px;letter-spacing:-0.01em;">MatchUp</div>
  </header>

  <section style="position:relative;padding:clamp(50px,9vw,110px) clamp(16px,4vw,56px) clamp(30px,5vw,60px);overflow:hidden;">
    <div aria-hidden="true" style="position:absolute;top:0;left:0;right:0;pointer-events:none;">
      <div style="font-family:'Anton',sans-serif;font-size:clamp(100px,26vw,340px);line-height:0.8;color:#FFFFFF;-webkit-text-stroke:2px rgba(17,17,17,0.09);white-space:nowrap;">MESSAGE</div>
    </div>
    <div style="position:relative;max-width:760px;margin:0 auto;">
      <div data-appear="-60,30,-3" style="font-family:'Bebas Neue',sans-serif;font-size:clamp(13px,2.6vw,18px);letter-spacing:0.32em;">MESSAGE FROM COACH DUFFY</div>
      <div data-appear="60,30,2" data-delay="0.06s" style="margin-top:10px;"><span style="background:#111111;color:#FFFFFF;font-weight:900;font-size:13px;padding:4px 12px;display:inline-block;transform:rotate(-2deg);">ダッフィー先生からのメッセージ</span></div>
      <h1 data-appear="0,50,0" data-delay="0.12s" style="margin:18px 0 0;font-weight:900;font-size:clamp(30px,7.6vw,56px);line-height:1.4;"><span style="background:linear-gradient(transparent 62%, #E9FF00 62%);padding:0 4px;">テニスに、才能はいらない。</span></h1>

      <div data-appear="0,50,0" data-delay="0.2s" style="margin-top:clamp(28px,5vw,48px);border:3px solid #111111;background:#FFFFFF;box-shadow:12px 12px 0 #E9FF00;padding:clamp(22px,5vw,44px);">
        <sc-for list="{{ bodyParas }}" as="p" hint-placeholder-count="7">
          <p style="margin:0 0 1.5em;font-size:clamp(14.5px,3.7vw,17px);font-weight:500;line-height:2.15;text-wrap:pretty;word-break:auto-phrase;line-break:strict;">{{ p.text }}</p>
        </sc-for>
        <div style="margin-top:clamp(20px,4vw,32px);padding-top:clamp(16px,3vw,22px);border-top:1px solid #E6E8E6;">
          <div style="font-size:13px;font-weight:500;color:#5A665F;text-align:right;">MatchUp テニスコーチ</div>
          <div style="font-weight:900;font-size:clamp(20px,5vw,30px);text-align:right;margin-top:6px;">渡辺 大輝<span style="font-weight:700;font-size:clamp(13px,3.2vw,16px);margin-left:10px;">/ ダッフィー先生</span></div>
        </div>
      </div>
    </div>
  </section>

  <section data-screen-label="ThoughtsCTA" style="position:relative;padding:clamp(30px,5vw,50px) clamp(16px,4vw,56px) clamp(70px,12vw,140px);overflow:hidden;">
    <div style="max-width:760px;margin:0 auto;">
      <div style="text-align:center;">
        <a href="apply.html" style="display:inline-block;background:#E9FF00;border:3px solid #111111;color:#111111;font-weight:900;font-size:clamp(15px,3.8vw,19px);padding:16px 28px;text-decoration:none;box-shadow:8px 8px 0 #111111;transform:rotate(-1deg);" style-hover="box-shadow:3px 3px 0 #111111;">申込フォームへ →</a>
      </div>
    </div>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { idx: 0, msg: null, list: [] };

  componentDidMount() {
    import('./lib/content.js').then((m) => {
      this.setState({ msg: m.message, list: m.beforeAfter });
    });
    this._reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!this._reduced) this.setupAppear();
    else this.revealAll();
  }

  setupAppear() {
    const els = Array.from(document.querySelectorAll('[data-appear]'));
    const io = new IntersectionObserver((entries) => {
      this._ioFired = true;
      for (const en of entries) {
        if (en.isIntersecting) {
          en.target.style.opacity = '1';
          en.target.style.transform = en.target.dataset.tFinal || 'none';
          io.unobserve(en.target);
        }
      }
    }, { threshold: 0.18 });
    for (const el of els) {
      const parts = (el.getAttribute('data-appear') || '0,60,0').split(',').map(Number);
      const base = el.style.transform || '';
      el.dataset.tFinal = base || 'none';
      el.style.opacity = '0';
      el.style.transform = 'translate(' + parts[0] + 'px,' + parts[1] + 'px) rotate(' + parts[2] + 'deg)' + (base ? ' ' + base : '');
      const d = el.getAttribute('data-delay') || '0s';
      el.style.transition = 'opacity 0.85s cubic-bezier(0.22,1,0.36,1) ' + d + ', transform 0.85s cubic-bezier(0.22,1,0.36,1) ' + d;
      io.observe(el);
    }
    this._io = io;
    this._ioFired = false;
    this._appearTimer = setTimeout(() => {
      if (!this._ioFired) { io.disconnect(); this._io = null; this.revealAll(); }
    }, 1200);
  }

  revealAll() {
    document.querySelectorAll('[data-appear]').forEach((el) => {
      el.style.opacity = '1';
      el.style.transform = el.dataset.tFinal || el.style.transform || 'none';
    });
  }

  componentWillUnmount() {
    if (this._appearTimer) clearTimeout(this._appearTimer);
    if (this._io) this._io.disconnect();
  }

  go(idx) {
    const n = this.state.list.length || 1;
    this.setState({ idx: ((idx % n) + n) % n });
  }

  renderVals() {
    const msg = this.state.msg;
    const list = this.state.list;
    const idx = this.state.idx;
    return {
      bodyParas: (msg ? msg.body : []).map((text) => ({ text })),
      signature: msg ? msg.signature : '',
      slides: list.map((s, i) => ({
        before: s.before, after: s.after,
        name: s.name || '', hasName: !!s.name,
        hidden: i !== idx
      })),
      dots: list.map((s, i) => ({
        pressed: i === idx,
        bg: i === idx ? '#E9FF00' : '#FFFFFF',
        aria: (i + 1) + '枚目へ',
        onGo: () => this.go(i)
      })),
      trackTransform: 'translateX(-' + idx * 100 + '%)',
      onPrev: () => this.go(idx - 1),
      onNext: () => this.go(idx + 1),
      onTouchStart: (e) => { this._tx = e.touches[0].clientX; },
      onTouchEnd: (e) => {
        if (this._tx == null) return;
        const dx = e.changedTouches[0].clientX - this._tx;
        this._tx = null;
        if (dx < -40) this.go(idx + 1);
        else if (dx > 40) this.go(idx - 1);
      }
    };
  }
}
</script>
</body>
</html>
